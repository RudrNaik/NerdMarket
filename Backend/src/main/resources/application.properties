spring.application.name=NerdMarket
server.port = 8080

spring.datasource.url=jdbc:mysql://coms-3090-022.class.las.iastate.edu:3306/Backend?useSSL=false
spring.datasource.username=duck
spring.datasource.password=Quack
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.deserialization.fail-on-null-for-primitives=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui-custom.html

# Send scan/websocket logs to a dedicated file
logging.file.name=logs/scanning-debug.log
logging.file.nam=logs/notifs-debug.log

# Keep the scan logs visible
logging.level.NerdMarket.scanning=DEBUG
logging.level.NerdMarket.notifs=DEBUG

# Quiet down the notification spam
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG