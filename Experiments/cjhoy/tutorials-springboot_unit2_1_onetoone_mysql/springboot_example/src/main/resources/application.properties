# ==============================================================
# DATABASE CONNECTION
# ==============================================================
spring.datasource.url=jdbc:mysql://coms-3090-022.class.las.iastate.edu:3306/DB309?useSSL=false
spring.datasource.username=cooperhoy
spring.datasource.password=Cooper
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# JPA / HIBERNATE
# ==============================================================
# update = auto-create/modify tables to match your entities
# create-drop = wipe and recreate tables every restart (useful for testing)
spring.jpa.hibernate.ddl-auto=update

# Show the SQL that Hibernate generates (very useful for debugging)
spring.jpa.hibernate.show_sql=true

# Format the SQL so it's readable (instead of one long line)
spring.jpa.properties.hibernate.format_sql=true

# Show the values being bound to SQL parameters (? placeholders)
# This lets you see the actual data being sent to the DB
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# MySQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================================================
# DEBUGGING - ERROR DETAILS
# ==============================================================
# Show full error details in JSON responses (instead of just "500 Internal Server Error")
# This shows the exception message and stack trace in Postman
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always
server.error.include-exception=true
# Quiet down noisy loggers
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.springframework.web=INFO

# Keep SQL logging readable
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Color output (if your terminal supports it)
spring.output.ansi.enabled=ALWAYS

# ==============================================================
# ACTUATOR - DEBUG ENDPOINTS
# ==============================================================
# Expose all actuator endpoints (health, mappings, beans, etc.)
# Try these in Postman:
#   GET /actuator/health    - is app running?
#   GET /actuator/mappings  - all your URL endpoints listed
#   GET /actuator/beans     - all Spring beans
management.endpoints.web.exposure.include=*

# ==============================================================
# LOGGING LEVELS
# ==============================================================
# Set to DEBUG to see more detail about what Spring is doing
# Set to WARN or ERROR to reduce noise
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG