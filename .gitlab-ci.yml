stages:
  - mavenDeploy
  - mavenTests
  - mavenBuild
  - androidTest
  - androidBuild

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DISCORD_WEBHOOK: "https://discord.com/api/webhooks/1470458727512412212/cE_zJ4I3ZIHMem0OwyLhig6wPhT9XJLgSkx_vxKa2-U3OpXiIirLzLBOhjE4FmX_Rd-7"

cache:
  paths:
    - .m2/repository/

android-test:
  image: afirefly/android-ci:java17
  stage: androidtest
  before_script:
    - export GRADLE_USER_HOME=`pwd`/.gradle
    - chmod +x ./Frontend/gradlew
  tags:
   - android_tag
  script:
    - cd Frontend
    - ./gradlew test

android-build:
  image: afirefly/android-ci:java17
  stage: androidbuild
  before_script:
    - export GRADLE_USER_HOME=`pwd`/.gradle
    - chmod +x ./Frontend/gradlew
  tags:
   - android_tag
  script:
    - cd Frontend
    - ./gradlew build
  artifacts:
    paths:
    - Android_test/app/build/outputs/



maven-build:
  stage: mavenBuild
  tags:
    - spring_bootTag
  script:
    - cd Backend
    - mvn clean package

maven-tests:
  stage: mavenTests
  tags:
    - spring_bootTag
  script:
    - cd Backend
    - mvn test
  artifacts:
    paths:
      - Backend/target/*.jar


deploy:
  stage: mavenDeploy
  tags:
    - spring_bootTag
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    # Build backend
    - cd Backend && mvn clean package -DskipTests && cd ..

    # Grab commit message
    - COMMIT_MSG=$(echo "$CI_COMMIT_MESSAGE" | head -n 1)

    # Send Discord notification - Starting
    - |
      curl -s -H "Content-Type: application/json" -X POST -d "{
        \"embeds\": [{
          \"title\": \"Deployment Started\",
          \"description\": \"Deploying Backend to production server...\",
          \"color\": 3447003,
          \"fields\": [
            {\"name\": \"Branch\", \"value\": \"$CI_COMMIT_REF_NAME\", \"inline\": true},
            {\"name\": \"Commit\", \"value\": \"$CI_COMMIT_SHORT_SHA\", \"inline\": true},
            {\"name\": \"Author\", \"value\": \"$GITLAB_USER_NAME\", \"inline\": true}
          ],
          \"footer\": {\"text\": \"$COMMIT_MSG\"},
          \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
        }]
      }" "$DISCORD_WEBHOOK" || true

    # Copy built jar to app directory
    - mkdir -p ~/app
    - mkdir -p ~/logs
    - cp Backend/target/demo-0.0.1-SNAPSHOT.jar ~/app/demo-0.0.1-SNAPSHOT.jar

    # Restart application
    - |
      # Kill screen session first (brings down the java process with it), then pkill as backup
      screen -S nerdmarket -X quit 2>/dev/null || true
      pkill -f demo-0.0.1-SNAPSHOT.jar 2>/dev/null || true
      sleep 3

      screen -dmS nerdmarket java -jar ~/app/demo-0.0.1-SNAPSHOT.jar --logging.file.name=/home/gitlab-runner/logs/backend.log
      sleep 5

      if screen -list | grep -q nerdmarket && pgrep -f demo-0.0.1-SNAPSHOT.jar > /dev/null; then
        echo "Application started successfully in screen session 'nerdmarket'"
      else
        echo "Failed to start application"
        exit 1
      fi

    # Send Discord notification - Success
    - |
      curl -s -H "Content-Type: application/json" -X POST -d "{
        \"embeds\": [{
          \"title\": \"Deployment Successful\",
          \"description\": \"Backend deployed and running successfully!\n\n**Server:** http://coms-3090-022.class.las.iastate.edu:8080\n**Location:** ~/app/\n**Screen Session:** nerdmarket\",
          \"color\": 3066993,
          \"fields\": [
            {\"name\": \"Branch\", \"value\": \"$CI_COMMIT_REF_NAME\", \"inline\": true},
            {\"name\": \"Commit\", \"value\": \"$CI_COMMIT_SHORT_SHA\", \"inline\": true},
            {\"name\": \"Author\", \"value\": \"$GITLAB_USER_NAME\", \"inline\": true}
          ],
          \"footer\": {\"text\": \"$COMMIT_MSG\"},
          \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
        }]
      }" "$DISCORD_WEBHOOK" || true

  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        curl -s -H "Content-Type: application/json" -X POST -d "{
          \"embeds\": [{
            \"title\": \"Deployment Failed\",
            \"description\": \"Backend deployment failed. Check pipeline logs.\n\n**Pipeline:** $CI_PIPELINE_URL\",
            \"color\": 15158332,
            \"fields\": [
              {\"name\": \"Branch\", \"value\": \"$CI_COMMIT_REF_NAME\", \"inline\": true},
              {\"name\": \"Commit\", \"value\": \"$CI_COMMIT_SHORT_SHA\", \"inline\": true},
              {\"name\": \"Author\", \"value\": \"$GITLAB_USER_NAME\", \"inline\": true}
            ],
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
          }]
        }" "$DISCORD_WEBHOOK" || true
      fi
